<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TaskFlow | Smart Task Tracker</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container py-3 py-md-4">
        <!-- Header Section -->
        <div class="row mb-4 fade-in">
            <div class="col-12">
                <div class="header-card">
                    <div class="d-flex flex-wrap justify-content-between align-items-center">
                        <div class="logo-section">
                            <div class="logo-icon">
                                <i class="fas fa-tasks"></i>
                            </div>
                            <div>
                                <h1 class="app-title">Task<span class="gradient-text">Flow</span></h1>
                                <p class="app-subtitle">Organize your life, one task at a time</p>
                            </div>
                        </div>
                        <div class="date-section">
                            <div class="current-date" id="currentDate"></div>
                            <div class="task-stats">
                                <i class="fas fa-chart-line"></i>
                                <span id="taskStats">0 tasks</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-3 mb-4 fade-in-up">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-primary-gradient">
                        <i class="fas fa-list-check"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Total Tasks</div>
                        <div class="stat-value" id="totalTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-success-gradient">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" id="completedTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-warning-gradient">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">In Progress</div>
                        <div class="stat-value" id="inProgressTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-danger-gradient">
                        <i class="fas fa-hourglass-half"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="pendingTasks">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row g-4">
            <!-- Add Task Section -->
            <div class="col-lg-5">
                <div class="task-card fade-in-up">
                    <div class="card-header-custom">
                        <h5 class="mb-0">
                            <i class="fas fa-plus-circle me-2"></i>
                            Add New Task
                        </h5>
                    </div>
                    
                    <form id="taskForm">
                        <div class="mb-3">
                            <label class="form-label-custom">
                                <i class="fas fa-tag"></i> Task Title
                            </label>
                            <input type="text" class="form-control-custom" id="taskTitle" 
                                   placeholder="Enter task title..." required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">
                                <i class="fas fa-align-left"></i> Description (Optional)
                            </label>
                            <textarea class="form-control-custom" id="taskDesc" 
                                      rows="2" placeholder="Add description..."></textarea>
                        </div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label-custom">
                                    <i class="fas fa-calendar"></i> Due Date
                                </label>
                                <input type="date" class="form-control-custom" id="taskDate">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">
                                    <i class="fas fa-flag"></i> Priority
                                </label>
                                <select class="form-control-custom" id="taskPriority">
                                    <option value="low">🟢 Low</option>
                                    <option value="medium" selected>🟡 Medium</option>
                                    <option value="high">🔴 High</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label-custom">
                                    <i class="fas fa-folder"></i> Category
                                </label>
                                <select class="form-control-custom" id="taskCategory">
                                    <option value="work">💼 Work</option>
                                    <option value="personal">🏠 Personal</option>
                                    <option value="study">📚 Study</option>
                                    <option value="health">💪 Health</option>
                                    <option value="other">🎯 Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">
                                    <i class="fas fa-chart-simple"></i> Status
                                </label>
                                <select class="form-control-custom" id="taskStatus">
                                    <option value="pending">⏳ Pending</option>
                                    <option value="in-progress">🔄 In Progress</option>
                                    <option value="completed">✅ Completed</option>
                                </select>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-add-task">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                    </form>
                </div>

                <!-- Filter Section -->
                <div class="task-card mt-4 fade-in-up">
                    <div class="card-header-custom">
                        <h5 class="mb-0">
                            <i class="fas fa-filter me-2"></i>
                            Filter Tasks
                        </h5>
                        <button class="btn-clear-filters" id="clearFilters">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>
                    
                    <div class="filter-group">
                        <label class="filter-label">Priority</label>
                        <div class="filter-buttons">
                            <button class="filter-btn" data-filter="priority-all">All</button>
                            <button class="filter-btn" data-filter="priority-low">Low</button>
                            <button class="filter-btn" data-filter="priority-medium">Medium</button>
                            <button class="filter-btn" data-filter="priority-high">High</button>
                        </div>
                    </div>
                    
                    <div class="filter-group mt-3">
                        <label class="filter-label">Category</label>
                        <div class="filter-buttons">
                            <button class="filter-btn" data-filter="category-all">All</button>
                            <button class="filter-btn" data-filter="category-work">Work</button>
                            <button class="filter-btn" data-filter="category-personal">Personal</button>
                            <button class="filter-btn" data-filter="category-study">Study</button>
                            <button class="filter-btn" data-filter="category-health">Health</button>
                            <button class="filter-btn" data-filter="category-other">Other</button>
                        </div>
                    </div>
                    
                    <div class="filter-group mt-3">
                        <label class="filter-label">Status</label>
                        <div class="filter-buttons">
                            <button class="filter-btn" data-filter="status-all">All</button>
                            <button class="filter-btn" data-filter="status-pending">Pending</button>
                            <button class="filter-btn" data-filter="status-in-progress">In Progress</button>
                            <button class="filter-btn" data-filter="status-completed">Completed</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Task List Section -->
            <div class="col-lg-7">
                <div class="task-card fade-in-up">
                    <div class="card-header-custom">
                        <h5 class="mb-0">
                            <i class="fas fa-tasks me-2"></i>
                            Task List
                        </h5>
                        <div class="view-options">
                            <button class="view-btn active" data-view="list">
                                <i class="fas fa-list"></i>
                            </button>
                            <button class="view-btn" data-view="grid">
                                <i class="fas fa-th-large"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="taskList" class="task-list-view">
                        <div class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <h6>No tasks yet</h6>
                            <p>Create your first task to get started!</p>
                        </div>
                    </div>
                </div>

                <!-- Analytics Section -->
                <div class="task-card mt-4 fade-in-up">
                    <div class="card-header-custom">
                        <h5 class="mb-0">
                            <i class="fas fa-chart-pie me-2"></i>
                            Analytics
                        </h5>
                        <div class="chart-controls">
                            <button class="chart-type-btn active" data-chart="bar">
                                <i class="fas fa-chart-bar"></i>
                            </button>
                            <button class="chart-type-btn" data-chart="pie">
                                <i class="fas fa-chart-pie"></i>
                            </button>
                            <button class="chart-type-btn" data-chart="line">
                                <i class="fas fa-chart-line"></i>
                            </button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title">
                        <i class="fas fa-edit me-2"></i>Edit Task
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label-custom">Task Title</label>
                        <input type="text" class="form-control-custom" id="editTaskTitle">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Description</label>
                        <textarea class="form-control-custom" id="editTaskDesc" rows="2"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Due Date</label>
                            <input type="date" class="form-control-custom" id="editTaskDate">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Priority</label>
                            <select class="form-control-custom" id="editTaskPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Category</label>
                            <select class="form-control-custom" id="editTaskCategory">
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="study">Study</option>
                                <option value="health">Health</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Status</label>
                            <select class="form-control-custom" id="editTaskStatus">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn-modal-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-modal-primary" id="saveTaskEdit">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
